version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ['8000:8000']
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - pdf-data:/data
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - pdf-data:/data
      - ./backend:/app
    command: celery -A app.celery_app:celery_app worker --loglevel=info --concurrency=4 -Q default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ['5173:80']
    restart: unless-stopped
    depends_on:
      - api

volumes:
  redis-data:
  pdf-data:
